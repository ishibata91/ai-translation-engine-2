run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - revive
    - staticcheck

formatters:
  enable:
    - gofmt

linters-settings:
  revive:
    rules:
      - name: context-as-argument
      - name: empty-block
      - name: errorf
      - name: if-return
      - name: increment-decrement
      - name: range
      - name: receiver-naming
      - name: superfluous-else
      - name: unexported-return
      - name: var-naming

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: pkg/dictionary/store.go
      linters:
        - gosec
      text: "G202:"
    - path: pkg/infrastructure/llm/retry.go
      linters:
        - gosec
      text: "G404:"
    - path: pkg/infrastructure/telemetry/provider.go
      linters:
        - revive
      text: "unexported-return"
    - path: pkg/translator/provider.go
      linters:
        - revive
      text: "unexported-return"
    - path: pkg/translator/persistence.go
      linters:
        - revive
      text: "unexported-return"
