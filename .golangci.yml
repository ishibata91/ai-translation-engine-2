run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - depguard
    - errcheck
    - gosec
    - govet
    - revive
    - staticcheck
    - stylecheck

formatters:
  enable:
    - gofmt

linters-settings:
  depguard:
    rules:
      controller_boundary:
        files:
          - "**/pkg/controller/**/*.go"
        list-mode: lax
        deny:
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/slice$
            desc: controller must not import slice
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/slice/
            desc: controller must not import slice
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/runtime$
            desc: controller must not import runtime
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/runtime/
            desc: controller must not import runtime
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/artifact$
            desc: controller must not import artifact
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/artifact/
            desc: controller must not import artifact
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/gateway$
            desc: controller must not import gateway
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/gateway/
            desc: controller must not import gateway
      workflow_boundary:
        files:
          - "**/pkg/workflow/*.go"
          - "**/pkg/workflow/**/*.go"
        list-mode: lax
        deny:
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/controller$
            desc: workflow must not import controller
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/controller/
            desc: workflow must not import controller
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/artifact$
            desc: workflow must not import artifact
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/artifact/
            desc: workflow must not import artifact
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/gateway$
            desc: workflow must not import gateway
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/gateway/
            desc: workflow must not import gateway
      slice_boundary:
        files:
          - "**/pkg/slice/*/*.go"
          - "!**/pkg/slice/*/test/*.go"
        list-mode: lax
        deny:
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/controller$
            desc: slice must not import controller
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/controller/
            desc: slice must not import controller
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/workflow$
            desc: slice must not import workflow
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/workflow/
            desc: slice must not import workflow
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/runtime$
            desc: slice must not import runtime
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/runtime/
            desc: slice must not import runtime
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/gateway$
            desc: slice must not import gateway directly
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/gateway/
            desc: slice must not import gateway directly
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/slice$
            desc: slice must not import another slice directly
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/slice/
            desc: slice must not import another slice directly
      runtime_boundary:
        files:
          - "**/pkg/runtime/**/*.go"
        list-mode: lax
        deny:
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/controller$
            desc: runtime must not import controller
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/controller/
            desc: runtime must not import controller
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/workflow$
            desc: runtime must not import workflow
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/workflow/
            desc: runtime must not import workflow
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/slice$
            desc: runtime must not import slice
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/slice/
            desc: runtime must not import slice
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/artifact$
            desc: runtime must not import artifact
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/artifact/
            desc: runtime must not import artifact
      artifact_boundary:
        files:
          - "**/pkg/artifact/**/*.go"
        list-mode: lax
        deny:
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/controller$
            desc: artifact must not import controller
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/controller/
            desc: artifact must not import controller
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/workflow$
            desc: artifact must not import workflow
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/workflow/
            desc: artifact must not import workflow
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/runtime$
            desc: artifact must not import runtime
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/runtime/
            desc: artifact must not import runtime
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/slice$
            desc: artifact must not import slice
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/slice/
            desc: artifact must not import slice
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/gateway$
            desc: artifact must not import gateway
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/gateway/
            desc: artifact must not import gateway
      gateway_boundary:
        files:
          - "**/pkg/gateway/**/*.go"
        list-mode: lax
        deny:
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/controller$
            desc: gateway must not import controller
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/controller/
            desc: gateway must not import controller
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/workflow$
            desc: gateway must not import workflow
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/workflow/
            desc: gateway must not import workflow
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/runtime$
            desc: gateway must not import runtime
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/runtime/
            desc: gateway must not import runtime
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/slice$
            desc: gateway must not import slice
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/slice/
            desc: gateway must not import slice
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/artifact$
            desc: gateway must not import artifact
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/artifact/
            desc: gateway must not import artifact
      foundation_boundary:
        files:
          - "**/pkg/foundation/**/*.go"
        list-mode: lax
        deny:
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/controller$
            desc: foundation must not import controller
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/controller/
            desc: foundation must not import controller
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/workflow$
            desc: foundation must not import workflow
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/workflow/
            desc: foundation must not import workflow
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/runtime$
            desc: foundation must not import runtime
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/runtime/
            desc: foundation must not import runtime
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/slice$
            desc: foundation must not import slice
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/slice/
            desc: foundation must not import slice
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/artifact$
            desc: foundation must not import artifact
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/artifact/
            desc: foundation must not import artifact
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/gateway$
            desc: foundation must not import gateway
          - pkg: github.com/ishibata91/ai-translation-engine-2/pkg/gateway/
            desc: foundation must not import gateway
  revive:
    rules:
      - name: context-as-argument
      - name: empty-block
      - name: errorf
      - name: if-return
      - name: increment-decrement
      - name: range
      - name: receiver-naming
      - name: superfluous-else
      - name: unexported-return
      - name: var-naming
  stylecheck:
    checks:
      - ST1020
      - ST1021
      - ST1022

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: pkg/dictionary/store.go
      linters:
        - gosec
      text: "G202:"
    - path: pkg/infrastructure/llm/retry.go
      linters:
        - gosec
      text: "G404:"
    - path: pkg/infrastructure/telemetry/provider.go
      linters:
        - revive
      text: "unexported-return"
    - path: pkg/translator/provider.go
      linters:
        - revive
      text: "unexported-return"
    - path: pkg/translator/persistence.go
      linters:
        - revive
      text: "unexported-return"
