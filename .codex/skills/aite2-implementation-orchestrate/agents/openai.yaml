display_name: AITE2 Implementation Orchestrate
short_description: impl 系 multi-agent orchestration の指揮者を担う
default_prompt: Use $aite2-implementation-orchestrate at skills/aite2-implementation-orchestrate to orchestrate implementation work by first running $aite2-context-collect, then spawning $aite2-frontend-implement and/or $aite2-backend-implement, then running $aite2-implementation-review and looping on findings.
