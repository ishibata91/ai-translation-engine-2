display_name: plan-direction
short_description: ユーザー入口として plan lane を受け、必要な plan chain を自律実行しつつ conflict 停止を担う
default_prompt: Use $plan-direction at skills/plan-direction as an orchestration-only user entry for design, spec completion, and docs sync. Run `plan-distill` first, then autonomously execute the required plan chain through `plan-ui`, `plan-scenario`, `plan-logic`, `plan-review`, and `plan-sync` as needed. If the request is actually implementation or bugfix work, stop immediately and return a handoff to the correct direction skill.
