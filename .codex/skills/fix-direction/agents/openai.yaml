display_name: fix-direction
short_description: ユーザー入口として fix lane だけを受け、下流 bugfix 作業を直接せずに routing と conflict 停止を担う
default_prompt: Use $fix-direction at skills/fix-direction as an orchestration-only user entry for bug reports, reproduction, triage, and bugfix routing. Delegate repro fixing, code or log inspection, root-cause analysis, implementation, and review to downstream fix skills instead of doing them yourself. If the request is actually planning or normal implementation work, stop immediately and return a handoff to the correct direction skill instead of doing downstream work directly.
