display_name: fix-direction
short_description: ユーザー入口として fix lane だけを受け、下流 bugfix 作業を直接せずに routing と conflict 停止を担う
default_prompt: Use $fix-direction at skills/fix-direction as an orchestration-only user entry for bug reports, reproduction, triage, and bugfix routing. Delegate distill, trace, optional analysis, implementation, and review to downstream fix skills instead of doing them yourself. Own the review trigger and score-based loop yourself, and if investigation concludes the issue is docs-only, stop and hand off to plan-direction instead of starting a code fix.
